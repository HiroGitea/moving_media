name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libglib2.0-dev \
            libatk1.0-dev \
            libpango1.0-dev \
            libgdk-pixbuf2.0-dev \
            libwayland-dev \
            libegl1-mesa-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ci-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ci-cargo-

      - name: Run tests
        run: cargo test
